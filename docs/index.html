<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Dashboard</title>
    <link rel="stylesheet" href="src-Database/MainSite-src/style.css">
</head>
<body>

    <button class="menu-trigger" id="menu-btn" aria-label="Menü öffnen">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="overlay" id="overlay"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-title" data-lang-de="Navigation" data-lang-en="Navigation">Navigation</div>
        <div class="theme-section">
            <button class="theme-toggle" id="theme-btn">
                <span id="theme-icon">🌙</span> <span id="theme-text">Dark Mode</span>
            </button>
        </div>
    </nav>

    <main class="main-card">
        <h1 data-lang-de="Willkommen" data-lang-en="Welcome">Willkommen</h1>
        <p class="subtitle" data-lang-de="Wähle einen Link aus der Liste:" data-lang-en="Choose a link from the list:">Wähle einen Link aus der Liste:</p>
        
        <div id="button-container"></div>

        <footer class="copyright">
            &copy; <span id="year"></span> Dein Name. <span data-lang-de="Alle Rechte vorbehalten." data-lang-en="All rights reserved.">Alle Rechte vorbehalten.</span>
        </footer>
    </main>

    <script src="src-Database/MainSite-src/script.js"></script>
</body>
</html>
