<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Hamburg Release Countdown</title>
    <style>
        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: #0b0c10;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
            /* Animation für den Blaulicht-Hintergrundeffekt */
            animation: blaulicht 6s infinite alternate;
        }

        /* Hintergrund-Animation: Wechselt dezent zwischen Alarm-Rot und Polizei-Blau */
        @keyframes blaulicht {
            0% { background-color: #070a14; box-shadow: inset 0 0 100px rgba(0, 0, 255, 0.2); }
            50% { background-color: #0d0d0d; box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.5); }
            100% { background-color: #140707; box-shadow: inset 0 0 100px rgba(255, 0, 0, 0.2); }
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            margin-bottom: 30px;
        }

        /* Der Container hält das Video im perfekten 16:9 Format */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Verhältnis */
            height: 0;
            overflow: hidden;
            max-width: 1075px; 
            margin: 0 auto;
            background: #000;
            border-radius: 12px;
            /* Ein leuchtender Rahmen passend zum Thema */
            border: 2px solid #333;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 110, 255, 0.2);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .controls {
            margin-top: 30px;
        }

        button {
            background: linear-gradient(135deg, #ff0000 0%, #990000 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            margin: 0 10px;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
        }

        button.sekundaer {
            background: linear-gradient(135deg, #444 0%, #222 100%);
        }

        button.sekundaer:hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <h1>Emergency Hamburg Release Countdown</h1>

   <iframe id="countdown-player" 
    src="https://youtube.com" 
    title="emergency hamburg release countdown" 
    frameborder="0" 
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
    crossorigin="anonymous"
    allowfullscreen>
</iframe>


    </div>

    <div class="controls">
        <button onclick="starteVideo()">Wiedergabe</button>
        <button class="sekundaer" onclick="stoppeVideo()">Pause</button>
    </div>

    <!-- YouTube JavaScript API -->
    <script>
        var tag = document.createElement('script');
        tag.src = "https://youtube.com";
        var firstScriptTag = document.getElementsByTagName('script');
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('countdown-player', {
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            console.log("Autoplay gestartet. Hinweis: Video startet im Browser standardmäßig stummgeschaltet.");
        }

        function starteVideo() {
            player.playVideo();
        }

        function stoppeVideo() {
            player.pauseVideo();
        }
    </script>

</body>
</html>
